# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'devel'}
          - {os: macos-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      JULIA_NUM_THREADS: 2
      NOT_CRAN: true
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        id: setup-r
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      # Caches the whole Julia depot - crucially ~/.julia/compiled and
      # ~/.julia/artifacts, which the previous hand-rolled actions/cache on
      # ~/.julia did not retain (it saved ~90 MiB, so every run re-paid the
      # full DataAxesFormats precompile, ~12 min). julia-actions/cache keys
      # include the Julia version and is content-hash validated by Julia's
      # own precompile machinery, so a cached build is never reused against a
      # changed DataAxesFormats/TanayLabUtilities source.
      - uses: julia-actions/cache@v3
        with:
          cache-name: ${{ runner.os }}-R${{ steps.setup-r.outputs.installed-r-version }}

      - name: Set R_HOME and configure RCall
        run: |
          R_HOME_PATH=$(Rscript -e 'cat(R.home())')
          echo "R_HOME=${R_HOME_PATH}" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${R_HOME_PATH}/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
          echo "JULIA_COPY_STACKS=1" >> $GITHUB_ENV

      - name: Install required Julia packages
        run: |
          julia -e '
          ENV["R_HOME"] = ENV["R_HOME"]
          using Pkg
          Pkg.add("Suppressor")
          Pkg.add("RCall")
          Pkg.add("Logging")
          Pkg.add("DataFrames")
          Pkg.add("HDF5")
          Pkg.add("LinearAlgebra")
          Pkg.add("Muon")
          Pkg.add("NamedArrays")
          Pkg.add("SparseArrays")
          # Add packages from GitHub repositories
          Pkg.add(url="https://github.com/tanaylab/TanayLabUtilities.jl")
          Pkg.add(url="https://github.com/tanaylab/DataAxesFormats.jl")
          # Rebuild RCall to ensure it links against the correct R
          Pkg.build("RCall")
          Pkg.precompile()
          '

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libhdf5-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::JuliaCall, any::cli, any::Matrix, any::tibble, any::tidyr, any::testthat, any::withr
          needs: check

      - name: Run R CMD check (without tests)
        env:
          _R_CHECK_CRAN_INCOMING_REMOTE_: false
          _R_CHECK_FORCE_SUGGESTS_: false
        run: |
          options(crayon.enabled = TRUE)
          rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--no-tests", "--no-multiarch"),
            error_on = "error",
            check_dir = "check"
          )
        shell: Rscript {0}

      - name: Install dafrjulia package
        run: R CMD INSTALL .

      # Tests run on macOS only - JuliaCall/RCall segfaults on Ubuntu Linux
      # due to R/Julia signal handler conflict (upstream issue).
      # Ubuntu runners still validate R CMD check passes.
      - name: Run testthat tests
        if: runner.os == 'macOS'
        run: |
          Rscript -e '
          library(testthat)
          library(dafrjulia)

          # Initialize Julia/DAF
          tryCatch({
            setup_daf(force_dev = TRUE, confirm_install = TRUE)
          }, error = function(e) {
            message("Julia/JuliaCall initialization failed: ", e$message)
            quit(status = 1)
          })

          # Run tests and fail on test failures
          results <- test_dir("tests/testthat", reporter = "summary")
          if (any(as.data.frame(results)$failed > 0)) {
            quit(status = 1)
          }
          '

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.config.os }}-r${{ matrix.config.r }}-results
          path: check
